<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found · ProScan</title>
    <link rel="icon" href="/icon128.png">
    <style>
        :root {
            --dark: #2a343e;
            --dark-hover: #4a545e;
            --light: #fcfcfc;
            --muted: #5a646e;
            --faint: #adb5bd;
            --line: #e4e7ea;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--light);
            background-image: radial-gradient(circle at 50% 0%, #f4f7f6 0%, var(--light) 60%);
            color: var(--dark);
            text-align: center;
            padding: 32px 24px;
            line-height: 1.6;
        }
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: rise 0.5s ease-out both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .card { animation: none; }
        }
        img.logo { height: 72px; margin-bottom: 16px; }
        .code {
            font-size: 5.5rem;
            font-weight: 700;
            line-height: 1;
            margin: 0;
            letter-spacing: 0.04em;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 10px 0 12px;
        }
        p.copy {
            color: var(--muted);
            max-width: 440px;
            margin: 0 0 32px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 48px;
        }
        a.cta {
            background: var(--dark);
            color: var(--light);
            padding: 13px 30px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: background-color 0.3s ease;
        }
        a.cta:hover { background: var(--dark-hover); }
        a.secondary {
            color: var(--dark);
            border: 2px solid var(--dark);
            padding: 11px 28px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        a.secondary:hover { background: var(--dark); color: var(--light); }
        .links {
            border-top: 1px solid var(--line);
            padding-top: 20px;
            font-size: 0.9rem;
        }
        .links a {
            color: var(--muted);
            text-decoration: none;
            margin: 0 12px;
        }
        .links a:hover { color: var(--dark); text-decoration: underline; text-underline-offset: 4px; }
        @media (max-width: 480px) {
            .code { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="/icon128.png" alt="ProScan logo">
        <p class="code">404</p>
        <h1>This page wandered off the listing.</h1>
        <p class="copy">We couldn't find what you were looking for — it may have moved, or the link might be out of date. Let's get you back to scanning.</p>
        <div class="actions">
            <a class="cta" href="/">Back to ProScan</a>
            <a class="secondary" href="https://chromewebstore.google.com/detail/proscan-amazon-product-sc/bikgignfnljpbmchlemkbbpboigodgap">Get the Chrome extension</a>
        </div>
        <div class="links">
            <a href="/">Home</a>
            <a href="/privacy/">Privacy Policy</a>
            <a href="/terms/">Terms of Service</a>
        </div>
    </div>
</body>
</html>
