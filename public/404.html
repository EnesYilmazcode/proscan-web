<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found · Proscan</title>
    <style>
        :root {
            --dark: #2a343e;
            --light: #fcfcfc;
            --muted: #5a646e;
            --accent: #667eea;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--light);
            color: var(--dark);
            text-align: center;
            padding: 24px;
        }
        img { height: 72px; margin-bottom: 8px; }
        h1 { font-size: 5rem; margin: 0; line-height: 1; }
        h2 { font-size: 1.5rem; margin: 8px 0 12px; font-weight: 600; }
        p { color: var(--muted); max-width: 420px; margin: 0 0 28px; line-height: 1.6; }
        a.home {
            background: var(--dark);
            color: var(--light);
            padding: 12px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        a.home:hover { background: #4a545e; }
    </style>
</head>
<body>
    <img src="/icon128.png" alt="Proscan logo">
    <h1>404</h1>
    <h2>This page wandered off.</h2>
    <p>We couldn't find what you were looking for. It may have moved, or the link might be incorrect.</p>
    <a class="home" href="/">Back to Proscan</a>
</body>
</html>
